name: Reusable Build and Deploy to ECS

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Service name (must match a folder in deploy-configs/)'
        required: true
        type: string
      environment:
        description: 'Target environment (dev, sit, uat, prod)'
        required: true
        type: string
      ecs_cluster:
        description: 'ECS cluster name'
        required: true
        type: string
      container_name:
        description: 'Container name in the task definition'
        required: true
        type: string
      ecs_task_definition:
        description: 'ECS task definition family name'
        required: true
        type: string
      ecs_service:
        description: 'ECS service name'
        required: true
        type: string
      aws_region:
        description: 'AWS region'
        required: true
        type: string
      ecr_repository:
        description: 'ECR repository name'
        required: true
        type: string
      iam_role:
        description: 'IAM role ARN for AWS credentials'
        required: true
        type: string
      cpu:
        description: 'Task definition CPU units'
        required: true
        type: string
      memory:
        description: 'Task definition memory (MiB)'
        required: true
        type: string

env:
  AWS_REGION: ${{ inputs.aws_region }}
  ECR_REPOSITORY: ${{ inputs.ecr_repository }}
  ECS_CLUSTER: ${{ inputs.ecs_cluster }}
  ECS_SERVICE: ${{ inputs.ecs_service }}
  ECS_TASK_DEFINITION: ${{ inputs.ecs_task_definition }}
  CONTAINER_NAME: ${{ inputs.container_name }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy (${{ inputs.service_name }} - ${{ inputs.environment }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Move application code to workspace root
        run: |
          mv spring-boot-examples/spring-boot-web-application/* .

      - name: Checkout deploy configs
        uses: actions/checkout@v4
        with:
          ref: deploy-config
          path: deploy-configs-repo
          sparse-checkout: 'deploy-configs/${{ inputs.service_name }}'

      - name: Copy Dockerfile from deploy configs
        run: |
          DOCKERFILE_PATH="deploy-configs-repo/deploy-configs/${{ inputs.service_name }}/Dockerfile"
          if [ ! -f "$DOCKERFILE_PATH" ]; then
            echo "::error::Dockerfile not found at $DOCKERFILE_PATH"
            exit 1
          fi
          cp "$DOCKERFILE_PATH" Dockerfile
          echo "--- Using Dockerfile for ${{ inputs.service_name }} ---"
          cat Dockerfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.iam_role }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                        -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Pull task definition from ECS
        id: pull-task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION \
            --query 'taskDefinition' \
            --output json | jq \
              --arg cpu "${{ inputs.cpu }}" \
              --arg mem "${{ inputs.memory }}" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | .cpu = $cpu | .memory = $mem' > task-definition.json
          echo "Pulled and cleaned task definition (cpu=${{ inputs.cpu }}, memory=${{ inputs.memory }}):"
          cat task-definition.json

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Set desired count to 2
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --desired-count 2