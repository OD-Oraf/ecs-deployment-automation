name: Deploy ECS Service

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service to deploy (must match a folder in deploy-configs/)'
        required: true
        type: choice
        options:
          - rest-service
          - frontend-app
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - sit
          - uat
          - prod

jobs:
  resolve-config:
    name: Resolve Config (${{ inputs.service_name }} - ${{ inputs.environment }})
    runs-on: ubuntu-latest
    outputs:
      ecs_cluster: ${{ steps.config.outputs.ecs_cluster }}
      ecs_service: ${{ steps.config.outputs.ecs_service }}
      ecs_task_definition: ${{ steps.config.outputs.ecs_task_definition }}
      container_name: ${{ steps.config.outputs.container_name }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      ecr_repository: ${{ steps.config.outputs.ecr_repository }}
      iam_role: ${{ steps.config.outputs.iam_role }}
      cpu: ${{ steps.config.outputs.cpu }}
      memory: ${{ steps.config.outputs.memory }}
    steps:
      - name: Checkout deploy configs
        uses: actions/checkout@v4
        with:
          ref: deploy-config
          sparse-checkout: 'deploy-configs/${{ inputs.service_name }}'

      - name: Load properties file
        id: config
        run: |
          PROPS_FILE="deploy-configs/${{ inputs.service_name }}/${{ inputs.environment }}.properties"
          if [ ! -f "$PROPS_FILE" ]; then
            echo "::error::Properties file not found: $PROPS_FILE"
            exit 1
          fi
          echo "--- Loading config from $PROPS_FILE ---"
          cat "$PROPS_FILE"
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" =~ ^# ]] && continue
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done < "$PROPS_FILE"

  deploy:
    name: Deploy ${{ inputs.service_name }} to ${{ inputs.environment }}
    needs: resolve-config
    uses: ./.github/workflows/ecs-build.yaml
    with:
      service_name: ${{ inputs.service_name }}
      environment: ${{ inputs.environment }}
      ecs_cluster: ${{ needs.resolve-config.outputs.ecs_cluster }}
      ecs_service: ${{ needs.resolve-config.outputs.ecs_service }}
      ecs_task_definition: ${{ needs.resolve-config.outputs.ecs_task_definition }}
      container_name: ${{ needs.resolve-config.outputs.container_name }}
      aws_region: ${{ needs.resolve-config.outputs.aws_region }}
      ecr_repository: ${{ needs.resolve-config.outputs.ecr_repository }}
      iam_role: ${{ needs.resolve-config.outputs.iam_role }}
      cpu: ${{ needs.resolve-config.outputs.cpu }}
      memory: ${{ needs.resolve-config.outputs.memory }}
